services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tcloud
      POSTGRES_PASSWORD: tcloud_dev
      POSTGRES_DB: tcloud_planner
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcloud -d tcloud_planner"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
